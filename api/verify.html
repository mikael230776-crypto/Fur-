<!DOCTYPE html>
<html>
<head>
  <title>FUR Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
      text-align: center;
      padding: 80px;
    }
    h1 {
      font-size: 32px;
    }
    .status {
      font-size: 20px;
      margin: 20px 0;
      font-weight: bold;
    }
    .verified {
      color: green;
    }
    .box {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ccc;
      display: inline-block;
      text-align: left;
    }
  </style>
</head>
<body>

  <h1>✔ VERIFIED</h1>

  <div class="status verified">
    Confirmed by FUR Verification System
  </div>

  <div class="box">
    <p><strong>Product ID:</strong> FUR-000001</p>
    <p><strong>Product:</strong> Organic Cotton Tote Bag</p>
    <p><strong>Brand:</strong> Example Brand Ltd</p>
    <p><strong>Status:</strong> Verified</p>
    <p><strong>Location:</strong> London, UK</p>
  </div>

</body>
</html>
